<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Licznik</title>

<style>

body{
font-family:Arial;
background:#0f0f0f;
color:white;
text-align:center;
padding-top:80px;
}

h1{
font-size:38px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,150px);
gap:20px;
justify-content:center;
}

.box{
background:#1c1c1c;
padding:20px;
border-radius:12px;
}

.number{
font-size:36px;
font-weight:bold;
}

.label{
font-size:14px;
color:#aaa;
}

</style>

</head>

<body>

<h1>Raúl jest bezrobotny od:</h1>

<div class="grid">

<div class="box">
<div class="number" id="years">0</div>
<div class="label">LAT</div>
</div>

<div class="box">
<div class="number" id="months">0</div>
<div class="label">MIESIĘCY</div>
</div>

<div class="box">
<div class="number" id="weeks">0</div>
<div class="label">TYGODNI</div>
</div>

<div class="box">
<div class="number" id="days">0</div>
<div class="label">DNI</div>
</div>

<div class="box">
<div class="number" id="hours">00</div>
<div class="label">GODZIN</div>
</div>

<div class="box">
<div class="number" id="minutes">00</div>
<div class="label">MINUT</div>
</div>

<div class="box">
<div class="number" id="seconds">00</div>
<div class="label">SEKUND</div>
</div>

</div>

<script>

const startDate = new Date("2025-07-01T00:00:00");

function update(){

const now = new Date();

let totalSeconds = Math.floor((now - startDate)/1000);

let seconds = totalSeconds % 60;
let minutes = Math.floor(totalSeconds/60) % 60;
let hours = Math.floor(totalSeconds/3600) % 24;

let totalDays = Math.floor(totalSeconds/86400);

let years = Math.floor(totalDays / 365);
let months = Math.floor((totalDays % 365) / 30);
let weeks = Math.floor((totalDays % 30) / 7);
let days = totalDays % 7;

document.getElementById("years").textContent = years;
document.getElementById("months").textContent = months;
document.getElementById("weeks").textContent = weeks;
document.getElementById("days").textContent = days;

document.getElementById("hours").textContent = String(hours).padStart(2,"0");
document.getElementById("minutes").textContent = String(minutes).padStart(2,"0");
document.getElementById("seconds").textContent = String(seconds).padStart(2,"0");

}

setInterval(update,1000);

update();

</script>

</body>
</html>
